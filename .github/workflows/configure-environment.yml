name: Configure Production Environment

on:
  workflow_dispatch:
  repository_dispatch:
    types: [setup-environment]

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Create and configure github-pages environment
        uses: actions/github-script@v7
        with:
          script: |
            const environmentName = 'github-pages';

            try {
              // Check if environment already exists
              let existingEnv;
              try {
                existingEnv = await github.rest.repos.getEnvironment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  environment_name: environmentName
                });
                console.log(`ℹ️  Environment '${environmentName}' already exists`);
              } catch (notFound) {
                console.log(`ℹ️  Environment '${environmentName}' does not exist, creating...`);
              }

              // Create or update the environment with protection rules
              const result = await github.rest.repos.createOrUpdateEnvironment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: environmentName,
                wait_timer: 0,  // Minutes to wait before deployment (0 = immediate)
                review_users: [],
                deployment_branch_policy: {
                  protected_branches: false,  // Allow from any branch
                  custom_branch_policies: false
                }
              });

              console.log(`✅ Environment '${environmentName}' configured successfully!`);
              console.log('   📋 Configuration:');
              console.log('      • Wait timer: 0 minutes (immediate deployment)');
              console.log('      • Required reviewers: None');
              console.log('      • Branch policy: All branches allowed');
              console.log('');
              console.log('📝 To add reviewers manually:');
              console.log(`   Settings → Environments → ${environmentName} → Required reviewers`);

            } catch (error) {
              console.error(`❌ Error configuring environment: ${error.message}`);
              console.error('💡 Note: This requires repository admin permissions');
              throw error;
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
