name: Configure Production Environment

on:
  workflow_dispatch:

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Create and configure github-pages environment
        uses: actions/github-script@v7
        with:
          script: |
            const environmentName = 'github-pages';
            
            try {
              // Create or update the environment with protection rules
              // The API automatically creates if doesn't exist, updates if it does
              await github.rest.repos.createOrUpdateEnvironment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: environmentName,
                wait_timer: 0,  // Minutes to wait before deployment (0 = immediate after approval)
                review_users: [],
                deployment_branch_policy: {
                  // Only allow deployment from protected branches
                  protected_branches: true,
                  custom_branch_policies: false
                },
                // Optionally restrict to specific branches
                // branch_policy can be: "all", "protected", or "selected"
                branch_policy: "protected"
              });

              console.log(`✅ Environment '${environmentName}' configured successfully!`);
              console.log('   - Required reviewers: NONE (manual approval still required via GitHub UI)');
              console.log('   - Branch policy: protected branches only');
              console.log('');
              console.log('⚠️  NOTE: To add required reviewers, go to:');
              console.log(`   Settings > Environments > ${environmentName} > Add reviewers`);
              
            } catch (error) {
              console.error(`❌ Error configuring environment: ${error.message}`);
              throw error;
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
