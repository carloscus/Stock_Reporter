name: Apply Branch Protection Rules

on:
  workflow_dispatch:
  repository_dispatch:
    types: [setup-protection]

jobs:
  protect-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection to main
        uses: actions/github-script@v7
        with:
          script: |
            const branches = ['main', 'gh-pages'];
            
            for (const branch of branches) {
              try {
                // Check if protection already exists
                await github.rest.repos.getBranchProtection({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch: branch
                });
                console.log(`Branch protection already exists for ${branch}`);
              } catch (error) {
                if (error.status === 404) {
                  console.log(`No protection exists for ${branch}, creating rules...`);
                } else {
                  console.log(`Error checking ${branch}: ${error.message}`);
                  continue;
                }
              }

              try {
                // Apply branch protection rules
                const config = branch === 'main' ? {
                  required_status_checks: {
                    strict: true,
                    contexts: []
                  },
                  enforce_admins: true,
                  required_pull_request_reviews: {
                    dismiss_stale_reviews: true,
                    require_code_owner_reviews: false,
                    required_approving_review_count: 0,
                    bypass_pull_request_bypassers: ['github-actions[bot]']
                  },
                  restrictions: null,
                  allow_force_pushes: true,
                  allow_deletions: false,
                  require_conversation_resolution: false,
                  required_signatures: false
                } : {
                  // gh-pages: less strict - allow force push for deployments
                  required_status_checks: {
                    strict: false,
                    contexts: []
                  },
                  enforce_admins: true,
                  required_pull_request_reviews: {
                    dismiss_stale_reviews: true,
                    require_code_owner_reviews: false,
                    required_approving_review_count: 0
                  },
                  restrictions: null,
                  allow_force_pushes: true, // Allow GitHub Actions to push
                  allow_deletions: false,
                  require_conversation_resolution: false,
                  required_signatures: false
                };

                await github.rest.repos.updateBranchProtection({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch: branch,
                  ...config
                });
                
                console.log(`✅ Branch protection applied successfully to ${branch}`);
              } catch (applyError) {
                console.log(`⚠️ Could not apply protection to ${branch}: ${applyError.message}`);
                console.log('Note: Repository admin privileges may be required to apply branch protection.');
              }
            }
