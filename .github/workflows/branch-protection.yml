name: Apply Branch Protection Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  protect-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection to main
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'main';
            
            try {
              // Get current protection settings to check if exists
              await github.rest.repos.getBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: branch
              });
              console.log('Branch protection already exists for main');
            } catch (error) {
              if (error.status === 404) {
                console.log('No protection exists, creating rules...');
              } else {
                throw error;
              }
            }

            // Apply branch protection rules
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: branch,
              required_status_checks: {
                strict: true,
                contexts: []
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                required_approving_review_count: 1
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              require_conversation_resolution: true,
              required_signatures: false
            });
            
            console.log('✅ Branch protection applied successfully to main');
