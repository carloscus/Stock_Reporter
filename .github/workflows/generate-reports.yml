name: Generar Reportes de Stock

on:
  workflow_dispatch:
  schedule:
    # Lunes a Domingo: 7am a 11pm hora Perú (GMT-5)
    # Se ejecuta cada hora, el script check-schedule verifica el horario
    - cron: '0 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Verificar horario Perú (7am-11pm)
        id: check
        run: |
          # Convertir hora UTC a hora Perú (GMT-5)
          HOUR_UTC=$(date -u +%H)
          DAY_OF_WEEK=$(date -u +%u)  # 1=Lunes, 7=Domingo
          
          # Calcular hora Perú
          HOUR_PERU=$((10#$HOUR_UTC - 5))
          if [ $HOUR_PERU -lt 0 ]; then
            HOUR_PERU=$((HOUR_PERU + 24))
          fi
          
          # Verificar: Domingo a Sábado (1-7) y hora 7-23 (7am-11pm)
          if [ "$DAY_OF_WEEK" -ge 1 ] && [ "$DAY_OF_WEEK" -le 7 ] && [ "$HOUR_PERU" -ge 7 ] && [ "$HOUR_PERU" -le 23 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Ejecutando: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏹️  Fuera de horario: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK (Solo Dom-Sáb 7am-11pm)"
          fi

  generate-reports:
    needs: check-schedule
    # Ejecutar en dispatch manual O si el schedule es válido
    if: github.event_name == 'workflow_dispatch' || needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Convert codigos_generales.xlsx to JSON
        run: node scripts/convert-codigos.js
      
      - name: Download Stock Data
        env:
          STOCK_URL: ${{ secrets.STOCK_API_URL }}
        run: node scripts/download-stock.js
      
      - name: Verify Stock Data
        run: |
          if [ -f "Data/data_stock.json" ]; then
            echo "✅ data_stock.json created successfully."
          else
            echo "❌ Error: data_stock.json was not created."
            exit 1
          fi
      
      - name: Merge data and generate Snapshots
        run: |
          echo "🔄 Generating stock reports..."
          node scripts/merge-stock.js

          # Validate that files were created
          if [ ! -f "frontend/public/productos_con_stock.json" ]; then
            echo "❌ Error: productos_con_stock.json was not generated"
            exit 1
          fi

          if [ ! -d "reports" ] || [ ! -d "frontend/public/reports" ]; then
            echo "❌ Error: Reports directories were not created"
            exit 1
          fi

          echo "✅ All files generated successfully"

      - name: Create Deploy Trigger File
        run: |
          echo "$(date +'%Y-%m-%d %H:%M:%S' -d '-5 hours')" > .deploy-trigger
          echo "🔄 Deploy trigger updated"

      - name: Commit and Push Report Changes
        id: autocommit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-update: Stock Snapshot - $(date +'%Y-%m-%d %H:%M' -d '-5 hours')"
          file_pattern: |
            reports/*.xlsx
            Data/*.json
            frontend/public/reports/*.xlsx
            frontend/public/productos_con_stock.json
            .deploy-trigger

      - name: Build Frontend
        run: |
          echo "🔨 Building frontend..."
          cd frontend
          npm install
          npm run build

      - name: Copy Data Files to Dist
        run: |
          echo "🔄 Copying data files to dist..."
          if [ -f "frontend/public/productos_con_stock.json" ]; then
            cp frontend/public/productos_con_stock.json frontend/dist/
            echo "✅ productos_con_stock.json copied"
          else
            echo "❌ Warning: productos_con_stock.json not found"
          fi
          if [ -d "frontend/public/reports" ]; then
            cp -r frontend/public/reports frontend/dist/
            echo "✅ reports directory copied"
          else
            echo "❌ Warning: reports directory not found"
          fi
          echo "📋 Dist contents:"
          ls -la frontend/dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Log Status
        run: |
          echo "✅ Reportes generados y deploy completado"
          echo "📊 Archivos publicados en gh-pages"

