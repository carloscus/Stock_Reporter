name: Generar Reportes de Stock

on:
  # Ejecutar manualmente
  workflow_dispatch:
  # Ejecutar diariamente de lunes a sábado entre 7am y 11pm (hora de Perú: UTC-5)
  schedule:
    - cron: '0 12-23 * * 1-6'  # 7am-6pm UTC = 12pm-11pm UTC (7am-6pm Perú)
    - cron: '0 0-4 * * 1-6'    # 7pm-11pm UTC = 12am-4am UTC (7pm-11pm Perú)

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install xlsx
      
      - name: Convert codigos_generales.xlsx to JSON
        run: node scripts/convert-codigos.js
      
      - name: Download stock and generate reports
        run: node scripts/merge-stock.js
        env:
          STOCK_URL: ${{ secrets.STOCK_URL }}
      
      - name: Commit generated reports
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-generate: Reportes de stock $(date +'%d-%m-%y')"
          file_pattern: "reports/*.xlsx Data/*.json"
      
      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-reports
          path: reports/
          retention-days: 30
