name: Generar Reportes de Stock

on:
  workflow_dispatch:
  schedule:
    # Corre cada hora al minuto 0
    # 12:00 UTC (7am PE) hasta las 04:00 UTC (11pm PE) del día siguiente
    - cron: '0 12-23 * * 1-6'
    - cron: '0 0-4 * * 2-0'

permissions:
  contents: write

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install xlsx exceljs
      
      - name: Convert codigos_generales.xlsx to JSON
        run: node scripts/convert-codigos.js
      
      - name: Download latest stock from appweb
        run: node scripts/download-stock.js
        env:
          STOCK_URL: ${{ secrets.STOCK_URL }}
      
      - name: Merge data and generate Snapshots
        run: node scripts/merge-stock.js
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Commit generated reports
        run: |
          git add reports/*.xlsx || true
          git add Data/*.json || true
          git add frontend/public/reports/*.xlsx || true
          git add frontend/public/productos_con_stock.json || true
        
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-update: Stock Snapshot $(date +'%d-%m-%y %H:%M')"
