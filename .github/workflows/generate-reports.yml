name: Generar Reportes de Stock

on:
  workflow_dispatch:
  schedule:
    # Lunes a Domingo: 7am a 11pm hora Perú (GMT-5)
    # Se ejecuta cada hora, el script check-schedule verifica el horario
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths:
      - 'Data/**'
      - 'scripts/**'
      - 'frontend/public/**'
      - 'reports/**'
      - '.github/workflows/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Verificar horario Perú (7am-11pm)
        id: check
        run: |
          # Convertir hora UTC a hora Perú (GMT-5)
          HOUR_UTC=$(date -u +%H)
          DAY_OF_WEEK=$(date -u +%u)  # 1=Lunes, 7=Domingo
          
          # Calcular hora Perú
          HOUR_PERU=$((10#$HOUR_UTC - 5))
          if [ $HOUR_PERU -lt 0 ]; then
            HOUR_PERU=$((HOUR_PERU + 24))
          fi
          
          # Verificar: Domingo a Sábado (1-7) y hora 7-23 (7am-11pm)
          if [ "$DAY_OF_WEEK" -ge 1 ] && [ "$DAY_OF_WEEK" -le 7 ] && [ "$HOUR_PERU" -ge 7 ] && [ "$HOUR_PERU" -lt 23 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Ejecutando: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏹️  Fuera de horario: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK (Solo Dom-Sáb 7am-11pm)"
          fi

  generate-reports:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Check if should generate reports
        id: should_generate
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Generating reports from schedule" >&2
            echo "generate_reports=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger - generating reports" >&2
            echo "generate_reports=true" >> $GITHUB_OUTPUT
          else
            echo "Push event - triggering deploy only" >&2
            echo "generate_reports=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Install dependencies
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: |
          npm install xlsx exceljs
      
      - name: Convert codigos_generales.xlsx to JSON
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: node scripts/convert-codigos.js
      
      - name: Download latest stock from appweb
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: node scripts/download-stock.js
        env:
          STOCK_URL: ${{ secrets.STOCK_URL }}
      
      - name: Merge data and generate Snapshots
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: node scripts/merge-stock.js
      
      - name: Configure Git
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Commit generated reports
        if: steps.should_generate.outputs.generate_reports == 'true'
        run: |
          git add reports/*.xlsx || true
          git add Data/*.json || true
          git add frontend/public/reports/*.xlsx || true
          git add frontend/public/productos_con_stock.json || true
        
      - name: Push changes
        if: steps.should_generate.outputs.generate_reports == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-update: Stock Snapshot"
          create_branch: false
          push_options: "--force"

      - name: Trigger Deploy Workflow
        run: |
          # Esperar 5 segundos para que el push se procese
          sleep 5
          # Usar repository_dispatch para garantizar el trigger del deploy
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "deploy-trigger", "client_payload": {"ref": "main"}}'
      
