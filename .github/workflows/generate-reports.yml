name: Generar Reportes de Stock

on:
  workflow_dispatch:
  schedule:
    # Lunes a Domingo: 7am a 11pm hora Perú (GMT-5)
    # Se ejecuta cada hora, el script check-schedule verifica el horario
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Verificar horario Perú (7am-11pm)
        id: check
        run: |
          # Convertir hora UTC a hora Perú (GMT-5)
          HOUR_UTC=$(date -u +%H)
          DAY_OF_WEEK=$(date -u +%u)  # 1=Lunes, 7=Domingo
          
          # Calcular hora Perú
          HOUR_PERU=$((10#$HOUR_UTC - 5))
          if [ $HOUR_PERU -lt 0 ]; then
            HOUR_PERU=$((HOUR_PERU + 24))
          fi
          
          # Verificar: Lunes a Sábado (1-6) y hora 7-22 (7am-11pm)
          if [ "$DAY_OF_WEEK" -ge 1 ] && [ "$DAY_OF_WEEK" -le 6 ] && [ "$HOUR_PERU" -ge 7 ] && [ "$HOUR_PERU" -lt 23 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Ejecutando: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏹️  Fuera de horario: Hora Perú = $HOUR_PERU, Día = $DAY_OF_WEEK (Solo Lun-Sáb 7am-11pm)"
          fi

  generate-reports:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install xlsx exceljs
      
      - name: Convert codigos_generales.xlsx to JSON
        run: node scripts/convert-codigos.js
      
      - name: Download latest stock from appweb
        run: node scripts/download-stock.js
        env:
          STOCK_URL: ${{ secrets.STOCK_URL }}
      
      - name: Merge data and generate Snapshots
        run: node scripts/merge-stock.js
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Commit generated reports
        run: |
          git add reports/*.xlsx || true
          git add Data/*.json || true
          git add frontend/public/reports/*.xlsx || true
          git add frontend/public/productos_con_stock.json || true
        
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Auto-update: Stock Snapshot $(date +'%d-%m-%y %H:%M')"
      
  trigger-deploy:
    needs: generate-reports
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy workflow
        uses: actions/github-script@v7
        if: github.event_name == 'schedule'
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'deploy-trigger',
              client_payload: {},
            });
