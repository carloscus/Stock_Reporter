name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ['Generar Reportes de Stock']
    types: [completed]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-trigger]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Copy static files to dist
        run: |
          # Copy static data files if they exist
          if [ -f "frontend/public/productos_con_stock.json" ]; then
            echo "✅ Copying productos_con_stock.json"
            cp frontend/public/productos_con_stock.json frontend/dist/
          else
            echo "⚠️  Warning: productos_con_stock.json not found"
          fi

          if [ -d "frontend/public/reports" ]; then
            echo "✅ Copying reports directory"
            cp -r frontend/public/reports frontend/dist/
          else
            echo "⚠️  Warning: reports directory not found"
          fi

      - name: Deploy to GitHub Pages
        id: deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
